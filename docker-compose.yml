# Calendar Jigsaw POC — API + static web (nginx serves pre-built dist/).
#
# Build artifacts on the host first (fast Docker builds — image only bundles runtime):
#   cd jigsaw-api && mvn clean package -DskipTests
#   cd jigsaw-web && cnpm i && cnpm run build
#   ./scripts/sync-web-dist-to-root.sh   # jigsaw-web/dist -> repo-root dist/ (GitHub Pages)
# Then:
#   docker compose build && docker compose up -d
#
# Pre-pulled Hub images (no local build):
#   docker compose pull && docker compose up
#
# Web UI: http://localhost:8000  →  calls API at http://localhost:8080 (browser origin;
# ensure jigsaw-web Backboard.Url matches host-accessible API — default localhost:8080).

services:
  api:
    build:
      context: ./jigsaw-api
      dockerfile: Dockerfile
    image: qunqunxu398/jigsaw-api:poc
    ports:
      - "8080:8080"
    restart: unless-stopped

  web:
    build:
      context: ./jigsaw-web
      dockerfile: Dockerfile
    image: qunqunxu398/jigsaw-web:poc
    ports:
      - "8000:8000"
    depends_on:
      - api
    restart: unless-stopped
